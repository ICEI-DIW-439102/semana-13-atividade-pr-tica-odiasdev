<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Serviço - Barber App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <h1 class="logo">💈 Barber App</h1>
      <nav>
        <a href="index.html" class="nav-link">Serviços</a>
        <a href="cadastro_servico.html" class="nav-link active">Cadastrar Serviço</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="form-section">
      <h2>Cadastrar novo serviço</h2>
      <form id="form-servico" class="form-servico">
        <div class="form-group">
          <label for="nome">Nome do serviço</label>
          <input type="text" id="nome" name="nome" required />
        </div>

        <div class="form-group">
          <label for="categoria">Categoria</label>
          <select id="categoria" name="categoria" required>
            <option value="">Selecione...</option>
            <option value="Corte">Corte</option>
            <option value="Barba">Barba</option>
            <option value="Combo">Combo</option>
            <option value="Tratamento">Tratamento</option>
          </select>
        </div>

        <div class="form-group">
          <label for="valor">Valor (R$)</label>
          <input type="number" id="valor" name="valor" min="0" required />
        </div>

        <div class="form-group">
          <label for="duracao">Duração (min)</label>
          <input type="number" id="duracao" name="duracao" min="0" required />
        </div>

        <div class="form-group">
          <label for="imagem">URL da imagem</label>
          <input type="url" id="imagem" name="imagem" required />
        </div>

        <div class="form-group">
          <label for="descricaoCurta">Descrição curta</label>
          <input type="text" id="descricaoCurta" name="descricaoCurta" required />
        </div>

        <div class="form-group">
          <label for="descricaoCompleta">Descrição completa</label>
          <textarea id="descricaoCompleta" name="descricaoCompleta" rows="5" required></textarea>
        </div>

        <div class="form-group">
          <label for="tags">Tags (separadas por vírgula)</label>
          <input type="text" id="tags" name="tags" placeholder="navalha, toalha-quente, óleo" />
        </div>

        <div class="form-group form-checkbox">
          <input type="checkbox" id="destaque" name="destaque" />
          <label for="destaque">Marcar como destaque</label>
        </div>

        <button type="submit" class="btn-reservar">Cadastrar serviço</button>
        <p id="form-feedback" class="form-feedback"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Barber App - Todos os direitos reservados</p>
  </footer>

  <script>
    const API_URL = "http://localhost:3000/servicos";

    document.getElementById("form-servico").addEventListener("submit", async (e) => {
      e.preventDefault();
      const feedback = document.getElementById("form-feedback");
      feedback.textContent = "Enviando...";

      const formData = new FormData(e.target);
      const novoServico = {
        nome: formData.get("nome"),
        categoria: formData.get("categoria"),
        valor: Number(formData.get("valor")),
        duracao: Number(formData.get("duracao")),
        imagem: formData.get("imagem"),
        descricaoCurta: formData.get("descricaoCurta"),
        descricaoCompleta: formData.get("descricaoCompleta"),
        tags: formData.get("tags").split(",").map(t => t.trim()).filter(Boolean),
        destaque: formData.get("destaque") === "on"
      };

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(novoServico)
        });
        if (!response.ok) throw new Error("Erro ao cadastrar");
        feedback.textContent = "✅ Serviço cadastrado com sucesso!";
        feedback.style.color = "var(--cor-sucesso)";
        e.target.reset();
      } catch (error) {
        feedback.textContent = "❌ Erro ao cadastrar o serviço.";
        feedback.style.color = "var(--cor-erro)";
      }
    });
  </script>
</body>
</html>
